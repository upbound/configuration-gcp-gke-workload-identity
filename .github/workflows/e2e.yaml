name: End to End Testing

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
jobs:
  e2e:
    uses: upbound/official-providers-ci/.github/workflows/pr-comment-trigger.yml@8965579a213ba2b249225fa311178ac66f107daf # main
    with:
      package-type: configuration
    secrets:
      UPTEST_CLOUD_CREDENTIALS: ${{ secrets.UPTEST_CLOUD_CREDENTIALS }}
      UPTEST_DATASOURCE: ${{ secrets.UPTEST_DATASOURCE }}
